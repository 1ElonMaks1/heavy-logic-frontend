    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товар — Heavy Logic</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container" style="display: flex; align-items: center; flex-wrap: wrap;">
            <a href="index.html" class="logo">⚡ HEAVY LOGIC</a>
            <nav style="margin-left: 30px;">
                <a href="index.html">Главная</a>
                <a href="shop.html">Магазин</a>
                <a href="services.html">Услуги</a>
                <a href="blog.html">Лаб / Блог</a>
            </nav>
            <div class="cart-icon">
                <a href="cart.html" class="cart-link">🛒 Корзина</a>
                <span id="cart-count" class="cart-count">0</span>
            </div>
        </div>
    </header>

    <main class="container" id="product-container">
        <p>Загрузка товара...</p>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Heavy Logic. Электроника для людей.</p>
            <p><a href="privacy.html">Политика конфиденциальности</a> | <a href="terms.html">Публичная оферта</a></p>
        </div>
    </footer>

    <div class="chat-widget">
        <a href="https://t.me/im_hot_tea" target="_blank" class="chat-button">💬 Написать в Telegram</a>
    </div>

    <script src="script.js"></script>
    <script>
        async function loadProduct() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            if (!productId) {
                document.getElementById('product-container').innerHTML = '<p>Товар не найден.</p>';
                return;
            }
            try {
                const response = await fetch('products.json');
                const products = await response.json();
                const product = products.find(p => p.id == productId);
                if (!product) {
                    document.getElementById('product-container').innerHTML = '<p>Товар не найден.</p>';
                    return;
                }
                renderProduct(product);
            } catch (error) {
                document.getElementById('product-container').innerHTML = '<p>Ошибка загрузки данных.</p>';
            }
        }

        function renderProduct(product) {
            const container = document.getElementById('product-container');
            const featuresList = product.features.map(f => `<li>${f}</li>`).join('');
            container.innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 30px;" class="product-container-grid">
                    <div>
                        <img src="${product.image}" alt="${product.name}" style="width: 100%; border: 1.5px solid #000;">
                    </div>
                    <div>
                        <h1>${product.name}</h1>
                        <div class="price">${product.price} ₽ ${product.oldPrice ? `<span class="old-price">${product.oldPrice} ₽</span>` : ''}</div>
                        <p>${product.description}</p>
                        <h3>Характеристики:</h3>
                        <ul>${featuresList}</ul>
                        <button class="add-to-cart btn" data-id="${product.id}" data-name="${product.name}" data-price="${product.price}" style="width: auto; padding: 12px 40px;">В корзину</button>
                    </div>
                </div>
            `;
            if (typeof window.attachCartListeners === 'function') {
                window.attachCartListeners();
            }
        }

        document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
</body>
</html>
