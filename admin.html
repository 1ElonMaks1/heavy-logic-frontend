<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка Heavy Logic</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 800px; margin: 40px auto; }
        .product-card-admin { border: 1.5px solid #000; padding: 20px; margin-bottom: 20px; background: #fff; }
        .product-card-admin input, .product-card-admin textarea { width: 100%; padding: 8px; margin: 5px 0; border: 1.5px solid #000; }
        .btn-small { padding: 6px 12px; font-size: 14px; margin-right: 10px; }
        #login-panel input { width: 250px; }
    </style>
</head>
<body>
    <div class="container admin-container">
        <h1>Админ-панель Heavy Logic</h1>

        <!-- Панель входа -->
        <div id="login-panel">
            <input type="password" id="admin-password" placeholder="Пароль">
            <button id="login-btn" class="btn">Войти</button>
        </div>

        <!-- Основная панель (скрыта до входа) -->
        <div id="admin-panel" style="display: none;">
            <div style="margin-bottom: 30px;">
                <h2>Добавить новый товар</h2>
                <form id="add-product-form">
                    <input type="text" name="name" id="prod-name" placeholder="Название" required>
                    <input type="number" name="price" id="prod-price" placeholder="Цена" step="0.01" required>
                    <input type="number" name="old_price" id="prod-old-price" placeholder="Старая цена (необязательно)" step="0.01">
                    <textarea name="description" id="prod-desc" placeholder="Описание"></textarea>
                    <input type="text" name="image" id="prod-image" placeholder="URL картинки" value="images/placeholder.jpg">
                    <input type="text" name="features" id="prod-features" placeholder="Характеристики (через запятую)">
                    <button type="submit" class="btn">Добавить товар</button>
                </form>
            </div>

            <h2>Существующие товары</h2>
            <div id="products-list"></div>
        </div>
    </div>

    <script>
        // ========== КОНФИГУРАЦИЯ ==========
        const API_BASE = 'https://heavy-logic-api-production.up.railway.app';
        // Пароль: по умолчанию 'password' (хеш ниже). Замени на свой, если менял.
        const SECRET_HASH = '5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8';

        let products = [];

        // ========== АВТОРИЗАЦИЯ ==========
        document.getElementById('login-btn').addEventListener('click', async () => {
            const pass = document.getElementById('admin-password').value;
            const encoder = new TextEncoder();
            const data = encoder.encode(pass);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            
            if (hashHex === SECRET_HASH) {
                sessionStorage.setItem('admin_auth', 'true');
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadProducts();
            } else {
                alert('Неверный пароль');
            }
        });

        if (sessionStorage.getItem('admin_auth') === 'true') {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            loadProducts();
        }

        // ========== ЗАГРУЗКА ТОВАРОВ ==========
        async function loadProducts() {
            try {
                const res = await fetch(`${API_BASE}/products`);
                if (!res.ok) throw new Error('Ошибка загрузки');
                products = await res.json();
                renderProductsList();
            } catch (err) {
                console.error(err);
                alert('Не удалось загрузить товары');
            }
        }

        function renderProductsList() {
            const container = document.getElementById('products-list');
            container.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card-admin';
                card.innerHTML = `
                    <h3>${product.name} (ID: ${product.id})</h3>
                    <label>Название: <input type="text" data-id="${product.id}" data-field="name" value="${product.name}"></label>
                    <label>Цена: <input type="number" data-id="${product.id}" data-field="price" value="${product.price}" step="0.01"></label>
                    <label>Старая цена: <input type="number" data-id="${product.id}" data-field="old_price" value="${product.old_price || ''}" step="0.01"></label>
                    <label>Описание: <textarea data-id="${product.id}" data-field="description">${product.description || ''}</textarea></label>
                    <label>Картинка: <input type="text" data-id="${product.id}" data-field="image" value="${product.image}"></label>
                    <label>Характеристики (через запятую): <input type="text" data-id="${product.id}" data-field="features" value="${product.features.join(', ')}"></label>
                    <button class="btn-small" onclick="updateProduct(${product.id})">Сохранить</button>
                    <button class="btn-small" style="background: white; color: black;" onclick="deleteProduct(${product.id})">Удалить</button>
                `;
                container.appendChild(card);
            });
        }

        // ========== СОЗДАНИЕ ТОВАРА ==========
        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('prod-name').value.trim();
            const price = parseFloat(document.getElementById('prod-price').value);
            const oldPriceInput = document.getElementById('prod-old-price').value;
            const old_price = oldPriceInput ? parseFloat(oldPriceInput) : null;
            const description = document.getElementById('prod-desc').value.trim();
            const image = document.getElementById('prod-image').value.trim();
            const featuresStr = document.getElementById('prod-features').value.trim();
            const features = featuresStr ? featuresStr.split(',').map(s => s.trim()) : [];

            const data = { name, price, old_price, description, image, features };
            console.log('Отправляем данные:', data);

            try {
                const res = await fetch(`${API_BASE}/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(errText);
                }
                alert('Товар добавлен!');
                document.getElementById('add-product-form').reset();
                loadProducts();
            } catch (err) {
                console.error(err);
                alert('Ошибка при добавлении товара: ' + err.message);
            }
        });

        // ========== ОБНОВЛЕНИЕ ТОВАРА ==========
        window.updateProduct = async function(id) {
            const fields = document.querySelectorAll(`[data-id="${id}"]`);
            const data = {};
            fields.forEach(field => {
                let value = field.value;
                if (field.dataset.field === 'price' || field.dataset.field === 'old_price') {
                    value = value === '' ? null : parseFloat(value);
                }
                if (field.dataset.field === 'features') {
                    value = value.split(',').map(s => s.trim());
                }
                data[field.dataset.field] = value;
            });
            console.log('Обновление товара', id, data);
            try {
                const res = await fetch(`${API_BASE}/products/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error(await res.text());
                alert('Товар обновлён');
                loadProducts();
            } catch (err) {
                console.error(err);
                alert('Ошибка обновления: ' + err.message);
            }
        };

        // ========== УДАЛЕНИЕ ТОВАРА ==========
        window.deleteProduct = async function(id) {
            if (!confirm('Удалить товар?')) return;
            try {
                const res = await fetch(`${API_BASE}/products/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error(await res.text());
                alert('Товар удалён');
                loadProducts();
            } catch (err) {
                console.error(err);
                alert('Ошибка удаления: ' + err.message);
            }
        };
    </script>
</body>
</html>
