<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка Heavy Logic</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 800px; margin: 40px auto; }
        .product-card-admin { border: 1.5px solid #000; padding: 20px; margin-bottom: 20px; background: #fff; }
        .product-card-admin input, .product-card-admin textarea { width: 100%; padding: 8px; margin: 5px 0; border: 1.5px solid #000; }
        .btn-small { padding: 6px 12px; font-size: 14px; margin-right: 10px; }
        #login-panel input { width: 250px; }
    </style>
</head>
<body>
    <div class="container admin-container">
        <h1>Админ-панель Heavy Logic</h1>

        <!-- Панель входа -->
        <div id="login-panel">
            <input type="password" id="admin-password" placeholder="Пароль">
            <button id="login-btn" class="btn">Войти</button>
        </div>

        <!-- Основная панель (скрыта до входа) -->
        <div id="admin-panel" style="display: none;">
            <div style="margin-bottom: 30px;">
                <h2>Добавить новый товар</h2>
                <form id="add-product-form">
                    <input type="text" name="name" placeholder="Название" required>
                    <input type="number" name="price" placeholder="Цена" step="0.01" required>
                    <input type="number" name="old_price" placeholder="Старая цена (необязательно)" step="0.01">
                    <textarea name="description" placeholder="Описание"></textarea>
                    <input type="text" name="image" placeholder="URL картинки" value="images/placeholder.jpg">
                    <input type="text" name="features" placeholder="Характеристики (через запятую)">
                    <button type="submit" class="btn">Добавить товар</button>
                </form>
            </div>

            <h2>Существующие товары</h2>
            <div id="products-list"></div>
        </div>
    </div>

    <script>
        // Пароль: 'heavy123' (замени на свой и сгенерируй хеш)
        const SECRET_HASH = '3419fad7d6261cc8162c7d399291ae43f7255829f4bfd15b763cf4d42cfc7003'; // 'password'
        const API_BASE = 'https://heavy-logic-api-production.up.railway.app';

        let products = [];

        // Проверка входа
        document.getElementById('login-btn').addEventListener('click', async () => {
            const pass = document.getElementById('admin-password').value;
            const encoder = new TextEncoder();
            const data = encoder.encode(pass);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            if (hashHex === SECRET_HASH) {
                sessionStorage.setItem('admin_auth', 'true');
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadProducts();
            } else {
                alert('Неверный пароль');
            }
        });

        if (sessionStorage.getItem('admin_auth') === 'true') {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            loadProducts();
        }

        async function loadProducts() {
            const res = await fetch(`${API_BASE}/products`);
            products = await res.json();
            renderProductsList();
        }

        function renderProductsList() {
            const container = document.getElementById('products-list');
            container.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card-admin';
                card.innerHTML = `
                    <h3>${product.name} (ID: ${product.id})</h3>
                    <label>Название: <input type="text" data-id="${product.id}" data-field="name" value="${product.name}"></label>
                    <label>Цена: <input type="number" data-id="${product.id}" data-field="price" value="${product.price}" step="0.01"></label>
                    <label>Старая цена: <input type="number" data-id="${product.id}" data-field="old_price" value="${product.old_price || ''}" step="0.01"></label>
                    <label>Описание: <textarea data-id="${product.id}" data-field="description">${product.description || ''}</textarea></label>
                    <label>Картинка: <input type="text" data-id="${product.id}" data-field="image" value="${product.image}"></label>
                    <label>Характеристики (через запятую): <input type="text" data-id="${product.id}" data-field="features" value="${product.features.join(', ')}"></label>
                    <button class="btn-small" onclick="updateProduct(${product.id})">Сохранить</button>
                    <button class="btn-small" style="background: white; color: black;" onclick="deleteProduct(${product.id})">Удалить</button>
                `;
                container.appendChild(card);
            });
        }

        async function updateProduct(id) {
            const fields = document.querySelectorAll(`[data-id="${id}"]`);
            const data = {};
            fields.forEach(field => {
                let value = field.value;
                if (field.dataset.field === 'price' || field.dataset.field === 'old_price') value = parseFloat(value) || null;
                if (field.dataset.field === 'features') value = value.split(',').map(s => s.trim());
                data[field.dataset.field] = value;
            });
            const res = await fetch(`${API_BASE}/products/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                alert('Товар обновлён');
                loadProducts();
            } else {
                alert('Ошибка обновления');
            }
        }

        async function deleteProduct(id) {
            if (!confirm('Удалить товар?')) return;
            const res = await fetch(`${API_BASE}/products/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert('Товар удалён');
                loadProducts();
            } else {
                alert('Ошибка удаления');
            }
        }

        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const featuresStr = form.features.value;
            const features = featuresStr ? featuresStr.split(',').map(s => s.trim()) : [];
            const data = {
                name: form.name.value,
                price: parseFloat(form.price.value),
                old_price: form.old_price.value ? parseFloat(form.old_price.value) : null,
                description: form.description.value,
                image: form.image.value,
                features: features
            };
            const res = await fetch(`${API_BASE}/products`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                alert('Товар добавлен');
                form.reset();
                loadProducts();
            } else {
                alert('Ошибка добавления');
            }
        });
    </script>
</body>
</html>
